<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420"><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111}.small{font-size:16px}.med{font-size:18px}.big{font-size:22px;font-weight:700}.axis{stroke:#222;stroke-width:2}.grid{stroke:#ccc;stroke-width:1}.shape{stroke:#111;stroke-width:2;fill:none}.fill{fill:#f2f2f2;stroke:#111;stroke-width:2}</style><text x="400" y="35" class="big" text-anchor="middle">Sampling Methods</text><circle cx="150" cy="180" r="28" class="shape" /><text x="150" y="185" class="med" text-anchor="middle">1</text><circle cx="250" cy="150" r="28" class="shape" /><text x="250" y="155" class="med" text-anchor="middle">2</text><circle cx="350" cy="190" r="28" class="shape" /><text x="350" y="195" class="med" text-anchor="middle">3</text><circle cx="450" cy="150" r="28" class="shape" /><text x="450" y="155" class="med" text-anchor="middle">4</text><circle cx="550" cy="185" r="28" class="shape" /><text x="550" y="190" class="med" text-anchor="middle">5</text><circle cx="650" cy="155" r="28" class="shape" /><text x="650" y="160" class="med" text-anchor="middle">6</text><text x="400" y="95" class="med" text-anchor="middle">Population of 60 students</text><rect x="140" y="270" width="180" height="80" class="shape" /><rect x="340" y="270" width="180" height="80" class="shape" /><rect x="540" y="270" width="120" height="80" class="shape" /><text x="230" y="300" class="med" text-anchor="middle">Simple random</text><text x="230" y="330" class="med" text-anchor="middle">6 names chosen</text><text x="430" y="300" class="med" text-anchor="middle">Stratified</text><text x="430" y="330" class="med" text-anchor="middle">sample by year group</text><text x="600" y="300" class="med" text-anchor="middle">Biased</text><text x="600" y="330" class="med" text-anchor="middle">friends only</text></svg>