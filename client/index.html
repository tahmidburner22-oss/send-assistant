    <script type="application/ld+json">

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">

      "mainEntity": [
        { "@type": "Question", "name": "What is Adaptly?", "acceptedAnswer": { "@type": "Answer", "text": "Adaptly is an AI-powered platform for UK SEND teachers that generates differentiated worksheets, manages a parent portal, tracks attendance and behaviour, and auto-schedules personalised learning for pupils with special educational needs." } },

        { "@type": "Question", "name": "Can parents access Adaptly?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Adaptly includes a dedicated parent portal where parents can view their child's assignments, attendance, behaviour records, and access GCSE past papers and mark schemes." } }
