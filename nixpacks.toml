[phases.setup]
nixPkgs = ["nodejs_22", "poppler_utils"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.32.1",
  "PATH=$(npm prefix -g)/bin:$PATH pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["PATH=$(npm prefix -g)/bin:$PATH pnpm build"]

[start]
cmd = "node dist/server/index.js"
